name: fastgs
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - cudatoolkit=11.6
  - plyfile
  - python=3.7.13
  - pip=22.3.1
  - pytorch=1.12.1
  - torchaudio=0.12.1
  - torchvision=0.13.1
  - tqdm
  - websockets
  - pip:
    # CUDA extensions (consolidated under third_party/). This conda env targets the
    # rendering (FastGS) pipeline. After creating the env, install the package itself
    # with:  pip install -e . --no-deps
    # For the surface (Fast-PGSR) pipeline also build third_party/diff-plane-rasterization
    # and install pytorch3d + trimesh + open3d + opencv-python (see README).
    - third_party/diff-gaussian-rasterization_fastgs
    - third_party/simple-knn
    - third_party/fused-ssim
